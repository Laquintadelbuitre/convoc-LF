<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convocations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch-dark:#12321f;
    --pitch:#1f5c3b;
    --green:#2f9e44;
    --green-dark:#237436;
    --red:#d62828;
    --red-dark:#a81f1f;
    --blue:#1d6fa5;
    --blue-dark:#155380;
    --amber:#e8a33d;
    --beige:#e8dfca;
    --royalblue:#1a3fa0;
    --darkgray:#4a4d52;
    --bg:#f4f6f2;
    --ink:#14231a;
    --card:#ffffff;
    --line:#e1e6dd;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--ink);
  }
  header.top{
    background:var(--pitch-dark);
    color:#fff;
    padding:18px 20px 46px;
    position:relative;
    overflow:hidden;
  }
  header.top::after{
    content:"";
    position:absolute;
    right:-60px; top:-60px;
    width:180px; height:180px;
    border:3px solid rgba(255,255,255,.12);
    border-radius:50%;
  }
  header.top::before{
    content:"";
    position:absolute;
    left:-40px; bottom:-80px;
    width:140px; height:140px;
    border:3px solid rgba(255,255,255,.08);
    border-radius:50%;
  }
  .title-row{
    display:flex; align-items:center; gap:10px;
    position:relative; z-index:1;
  }
  .title-row input{
    background:transparent;
    border:none;
    color:#fff;
    font-size:20px;
    font-weight:800;
    letter-spacing:.5px;
    text-transform:uppercase;
    width:100%;
    padding:4px 0;
    border-bottom:1px solid rgba(255,255,255,.25);
  }
  .title-row input:focus{outline:none; border-bottom-color:var(--amber);}
  .subtitle{
    font-size:12px;
    color:rgba(255,255,255,.6);
    margin-top:4px;
    position:relative; z-index:1;
  }
  nav.tabs{
    display:flex;
    gap:6px;
    margin:-30px 16px 0;
    position:relative;
    z-index:2;
  }
  nav.tabs button{
    flex:1;
    border:none;
    padding:12px 8px;
    font-size:13px;
    font-weight:700;
    letter-spacing:.3px;
    text-transform:uppercase;
    background:var(--card);
    color:#8b978f;
    border-radius:10px 10px 0 0;
    cursor:pointer;
  }
  nav.tabs button.active{
    background:var(--card);
    color:var(--pitch-dark);
    box-shadow:0 -2px 0 var(--amber) inset;
  }
  main{
    max-width:760px;
    margin:0 auto;
    padding:0 16px 60px;
  }
  .panel{
    background:var(--card);
    border-radius:0 0 12px 12px;
    padding:20px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
    margin-bottom:20px;
    display:none;
  }
  .panel.active{display:block;}
  h2{
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:.5px;
    color:var(--pitch-dark);
    margin:0 0 14px;
  }
  h3{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.4px;
    margin:0 0 10px;
  }
  .field{margin-bottom:12px;}
  .field label{
    display:block;
    font-size:12px;
    color:#6b756e;
    margin-bottom:4px;
    font-weight:600;
  }
  .field input, .field select{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:14px;
    font-family:inherit;
  }
  .field input:focus, .field select:focus{outline:2px solid var(--amber); border-color:transparent;}
  .row2{display:flex; gap:10px;}
  .row2 > div{flex:1;}
  .two-col{display:flex; gap:18px; margin-bottom:16px;}
  .two-col .team-col{flex:1; min-width:0; padding:14px; border-radius:10px; border:1px solid var(--line);}
  .two-col .team-col.a{border-left:4px solid var(--green);}
  .two-col .team-col.b{border-left:4px solid var(--red);}
  @media (max-width:600px){ .two-col{flex-direction:column;} }
  .btn{
    display:inline-block;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.3px;
    cursor:pointer;
  }
  .btn-primary{background:var(--pitch-dark); color:#fff;}
  .btn-amber{background:var(--amber); color:#1a1a1a;}
  .btn-primary:hover{background:var(--pitch);}
  .list-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    margin-bottom:8px;
    font-size:14px;
  }
  .list-item .meta{color:#7a847d; font-size:12px; margin-top:2px;}
  .del{
    background:none; border:none; color:#b23; font-size:18px; cursor:pointer; padding:0 4px;
    line-height:1;
  }
  .empty{
    color:#8b978f;
    font-size:13px;
    text-align:center;
    padding:20px 0;
  }
  .team-block{
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px;
    margin-bottom:14px;
  }
  .team-block.a{border-left:4px solid var(--green);}
  .team-block.b{border-left:4px solid var(--red);}
  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:6px;
  }
  .chip{
    position:relative;
    padding:9px 26px 9px 14px;
    border-radius:20px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    user-select:none;
    background:var(--beige);
    color:#4a4030;
  }
  .chip .order-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:18px; height:18px;
    border-radius:50%;
    background:rgba(0,0,0,.18);
    color:inherit;
    font-size:11px;
    margin-right:6px;
    vertical-align:middle;
  }
  .chip.state-A{background:var(--red); color:#fff;}
  .chip.state-B{background:var(--royalblue); color:#fff;}
  .chip.state-blesse{background:var(--green); color:#fff;}
  .chip.state-absent{background:var(--darkgray); color:#fff;}
  .ctx-menu{
    position:fixed;
    background:#fff;
    border-radius:10px;
    box-shadow:0 4px 16px rgba(0,0,0,.2);
    padding:6px;
    z-index:100;
    min-width:160px;
  }
  .ctx-menu button{
    display:block;
    width:100%;
    text-align:left;
    border:none;
    background:none;
    padding:9px 12px;
    font-size:13px;
    font-weight:600;
    border-radius:6px;
    cursor:pointer;
  }
  .ctx-menu button:hover{background:#f1f3f0;}
  .ctx-menu button.blesse{color:var(--green);}
  .ctx-menu button.absent{color:var(--darkgray);}
  .chip .star{
    position:absolute;
    top:1px; right:3px;
    font-size:13px;
    line-height:1;
    padding:2px;
    cursor:pointer;
    opacity:.55;
  }
  .chip .star.on{opacity:1; color:#ffe08a;}
  .match-info{
    display:flex;
    gap:10px;
    margin-bottom:16px;
  }
  .match-info .card{
    flex:1;
    border-radius:10px;
    padding:12px;
    color:#fff;
    font-size:13px;
  }
  .match-info .card.a{background:var(--red-dark);}
  .match-info .card.b{background:var(--royalblue);}
  .match-info .card b{display:block; font-size:14px; margin-bottom:2px;}
  .hint{font-size:12px; color:#7a847d; margin:10px 0 16px;}
  .legend{display:flex; gap:14px; font-size:12px; color:#556; margin-bottom:14px; flex-wrap:wrap;}
  .legend span{display:inline-flex; align-items:center; gap:5px;}
  .dot{width:10px;height:10px;border-radius:50%; display:inline-block;}
  #canvasWrap{text-align:center; margin-top:16px;}
  #canvasWrap .imgBlock{margin-bottom:24px;}
  #canvasWrap canvas{max-width:100%; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.15);}
  .actions{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;}
  .save-link{display:inline-block; margin-top:12px;}
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:8px;
    font-size:13px; opacity:0; pointer-events:none; transition:opacity .25s;
    z-index:50;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header class="top">
  <div class="title-row">
    <input id="clubTitle" value="U13 Limoges Football" maxlength="40">
  </div>
  <div class="subtitle">Convocations hebdomadaires</div>
</header>

<nav class="tabs">
  <button class="active" data-tab="effectif">Effectif</button>
  <button data-tab="calendrier">Calendrier</button>
  <button data-tab="convocation">Convocation</button>
</nav>

<main>

  <section class="panel active" id="panel-effectif">
    <h2>Liste des enfants</h2>
    <div class="field">
      <label>Nom de l'enfant</label>
      <div class="row2">
        <input id="childName" placeholder="Prénom Nom" maxlength="40">
        <div style="flex:0 0 auto;"><button class="btn btn-primary" id="addChildBtn">Ajouter</button></div>
      </div>
    </div>
    <div id="childList"></div>
  </section>

  <section class="panel" id="panel-calendrier">
    <h2>Ajouter une rencontre</h2>
    <div class="two-col">
      <div class="team-col a">
        <h3 style="color:var(--red-dark);">Équipe A</h3>
        <div class="field"><label>Libellé (ex. Journée 5)</label><input id="labelA" placeholder="Journée 5" maxlength="30"></div>
        <div class="field"><label>Date</label><input id="dateA" type="date"></div>
        <div class="field"><label>Adversaire (après "VS")</label><input id="advA" placeholder="Bessines (match en retard)"></div>
        <div class="field"><label>Heure du RDV</label><input id="heureA" placeholder="14h15"></div>
        <div class="field"><label>Lieu du RDV</label><input id="lieuA" placeholder="Stade J.M Lafond"></div>
        <div class="field"><label>Adresse du stade</label><input id="adresseA" placeholder="2 avenue de..., 87250 Bessines"></div>
      </div>
      <div class="team-col b">
        <h3 style="color:var(--royalblue);">Équipe B</h3>
        <div class="field"><label>Libellé (ex. Journée 5)</label><input id="labelB" placeholder="Journée 5" maxlength="30"></div>
        <div class="field"><label>Date</label><input id="dateB" type="date"></div>
        <div class="field"><label>Adversaire (après "VS")</label><input id="advB" placeholder="Tournoi Moulins Yzeure"></div>
        <div class="field"><label>Heure du RDV</label><input id="heureB" placeholder="7h00"></div>
        <div class="field"><label>Lieu du RDV</label><input id="lieuB" placeholder="Parking du McDonald's"></div>
        <div class="field"><label>Adresse du stade</label><input id="adresseB" placeholder="Centre Commercial Cora, 87280 Limoges"></div>
      </div>
    </div>

    <button class="btn btn-primary" id="addMatchBtn">Ajouter la rencontre</button>

    <h2 style="margin-top:28px;">Rencontres de la saison</h2>
    <div id="matchList"></div>
  </section>

  <section class="panel" id="panel-convocation">
    <h2>Sélection de la rencontre</h2>
    <div class="field">
      <select id="matchSelect"></select>
    </div>

    <div id="matchInfoBox"></div>

    <div id="convocationBody"></div>

    <div class="actions">
      <button class="btn btn-amber" id="generateBtn">Générer les images</button>
    </div>

    <div id="canvasWrap"></div>
  </section>

</main>

<div class="toast" id="toast"></div>

// Stockage local au navigateur (fonctionne une fois hébergé sur GitHub Pages,
// contrairement à window.storage qui n'existe que dans l'environnement Claude).
const store = {
  async get(key){
    const v = localStorage.getItem(key);
    return v !== null ? {key, value: v} : null;
  },
  async set(key, value){
    localStorage.setItem(key, value);
    return {key, value};
  }
};
let children = [];
let matches = [];
let currentMatchId = null;
let assignments = {}; // { childId: {team:'A'|'B'|'blesse', mute:bool} }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ---------- persistence ----------
const DEFAULT_ROSTER = ["Hadi","Sebastien","Mickaël","Bakoutoubo","Sacha","Keys","Nourou","Yanis","Mathis","Ethan","Abdoul Karim","Jalil","Gabin","Adam","Kalifa","Bilel","Pablo","Melih","Issam","Emir","Loan","Sarah"];
const MUTED_NAMES = ["Adam","Mickaël","Yanis","Ethan","Mathis"];

// Returns the most recent Sunday 23:59 that has already passed (the last weekly reset boundary).
function mostRecentSundayReset(now){
  const d = new Date(now);
  const daysSinceSunday = d.getDay(); // 0 = Sunday
  const candidate = new Date(d);
  candidate.setHours(23,59,0,0);
  candidate.setDate(d.getDate() - daysSinceSunday);
  if(candidate.getTime() > d.getTime()){
    candidate.setDate(candidate.getDate() - 7);
  }
  return candidate;
}

// Clears all saved team assignments (Équipe A/B, blessé, non convoqué) once per week,
// right after Sunday 23:59, so last-minute changes during the week are kept but each
// new week's convocations start from a clean slate automatically.
function runWeeklyResetIfDue(){
  const now = new Date();
  const boundary = mostRecentSundayReset(now);
  const lastResetRaw = localStorage.getItem('lastReset');
  const lastReset = lastResetRaw ? new Date(lastResetRaw) : new Date(0);
  if(lastReset.getTime() < boundary.getTime()){
    Object.keys(localStorage).forEach(key=>{
      if(key.startsWith('conv_')) localStorage.removeItem(key);
    });
    localStorage.setItem('lastReset', now.toISOString());
  }
}

async function loadAll(){
  runWeeklyResetIfDue();
  try{
    const c = await store.get('effectif', false);
    if(c){
      children = JSON.parse(c.value);
      // migrate: give every child a permanent `mute` flag; only seed it the first time
      // (from the known muted-players list) so a later manual change sticks.
      let changed = false;
      children.forEach(ch=>{
        if(typeof ch.mute !== 'boolean'){ ch.mute = MUTED_NAMES.includes(ch.name); changed = true; }
      });
      if(changed) await store.set('effectif', JSON.stringify(children), false);
    } else {
      children = DEFAULT_ROSTER.map(name => ({id: uid(), name, mute: MUTED_NAMES.includes(name)}));
      await store.set('effectif', JSON.stringify(children), false);
    }
  }catch(e){ children = []; }
  try{
    const m = await store.get('calendrier', false);
    matches = m ? JSON.parse(m.value) : [];
  }catch(e){ matches = []; }
  try{
    const title = await store.get('titre', false);
    if(title) document.getElementById('clubTitle').value = title.value;
  }catch(e){}
}

async function saveChildren(){
  try{ await store.set('effectif', JSON.stringify(children), false); }
  catch(e){ toast("Erreur d'enregistrement"); }
}
async function saveMatches(){
  try{ await store.set('calendrier', JSON.stringify(matches), false); }
  catch(e){ toast("Erreur d'enregistrement"); }
}
async function saveTitle(){
  try{ await store.set('titre', document.getElementById('clubTitle').value, false); }
  catch(e){}
}
async function loadAssignments(matchId){
  try{
    const r = await store.get('conv_' + matchId, false);
    assignments = r ? JSON.parse(r.value) : {};
  }catch(e){ assignments = {}; }
}
async function saveAssignments(){
  if(!currentMatchId) return;
  try{ await store.set('conv_' + currentMatchId, JSON.stringify(assignments), false); }
  catch(e){ toast("Erreur d'enregistrement"); }
}

// ---------- tabs ----------
document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab === 'convocation'){ renderMatchSelect(); }
  });
});

document.getElementById('clubTitle').addEventListener('change', saveTitle);

// ---------- effectif ----------
function sortedChildren(){
  return [...children].sort((a,b)=> a.name.localeCompare(b.name, 'fr', {sensitivity:'base'}));
}

function renderChildren(){
  const box = document.getElementById('childList');
  if(children.length === 0){
    box.innerHTML = '<div class="empty">Aucun enfant ajouté pour l\'instant.</div>';
    return;
  }
  box.innerHTML = sortedChildren().map(c => `
    <div class="list-item">
      <span>${escapeHtml(c.name)} <span class="star ${c.mute?'on':''}" data-id="${c.id}" title="Joueur muté" style="position:static; opacity:${c.mute?1:.35};">★</span></span>
      <button class="del" data-id="${c.id}" title="Supprimer">×</button>
    </div>
  `).join('');
  box.querySelectorAll('.del').forEach(b=>{
    b.addEventListener('click', ()=>{
      children = children.filter(c=>c.id !== b.dataset.id);
      saveChildren();
      renderChildren();
    });
  });

function filenameDate(iso){
  if(!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if(isNaN(d)) return iso;
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}-${mm}-${d.getFullYear()}`;
}

function formatDate(iso){
  const d = new Date(iso + 'T00:00:00');
  if(isNaN(d)) return iso;
  let s = d.toLocaleDateString('fr-FR', {weekday:'long', day:'2-digit', month:'long', year:'numeric'});
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function getAssign(id){
  return assignments[id] || {team: undefined, order: undefined};
}

function nextOrder(){
  let max = 0;
  Object.values(assignments).forEach(a=>{
    if(typeof a.order === 'number' && a.order > max) max = a.order;
  });
  return max + 1;
}

function closeCtxMenu(){
  const existing = document.querySelector('.ctx-menu');
  if(existing) existing.remove();
}

function renderChips(){
  const chipBox = document.getElementById('chipBox');
  chipBox.innerHTML = sortedChildren().map(c=>{
    const a = getAssign(c.id);
    const cls = a.team === 'A' ? 'state-A' : (a.team === 'B' ? 'state-B' : (a.team === 'blesse' ? 'state-blesse' : (a.team === 'absent' ? 'state-absent' : '')));
    const badge = (a.team === 'A' || a.team === 'B') && a.order ? `<span class="order-badge">${a.order}</span>` : '';
    return `<div class="chip ${cls}" data-id="${c.id}">${badge}${escapeHtml(c.name)}${c.mute ? '<span class="star on">★</span>' : ''}</div>`;
  }).join('');

  chipBox.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      closeCtxMenu();
      const id = chip.dataset.id;
      const a = getAssign(id);
      if(a.team === 'blesse' || a.team === 'absent'){
        assignments[id] = {team: undefined, order: undefined};
      } else if(!a.team){
        assignments[id] = {team:'A', order: nextOrder()};
      } else if(a.team === 'A'){
        assignments[id] = {team:'B', order: a.order};
      } else {
        assignments[id] = {team: undefined, order: undefined};
      }
      saveAssignments();
      renderChips();
    });
    chip.addEventListener('contextmenu', e=>{
      e.preventDefault();
      closeCtxMenu();
      const id = chip.dataset.id;
      const menu = document.createElement('div');
      menu.className = 'ctx-menu';
      menu.style.left = Math.min(e.clientX, window.innerWidth-180) + 'px';
      menu.style.top = Math.min(e.clientY, window.innerHeight-100) + 'px';
      menu.innerHTML = `
        <button class="blesse">Joueur blessé</button>
        <button class="absent">Joueur non convoqué</button>
      `;
      menu.querySelector('.blesse').addEventListener('click', ()=>{
        assignments[id] = {team:'blesse', order: undefined};
        saveAssignments();
        closeCtxMenu();
        renderChips();
      });
      menu.querySelector('.absent').addEventListener('click', ()=>{
        assignments[id] = {team:'absent', order: undefined};
        saveAssignments();
        closeCtxMenu();
        renderChips();
      });
      document.body.appendChild(menu);
      setTimeout(()=>{
        document.addEventListener('click', closeCtxMenu, {once:true});
      }, 0);
    });
  });
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function renderConvocationImage(m, teamKey, players, wrap){
  const info = m[teamKey];
  const W = 1600, H = 900;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const [bg, logo, photoTop, photoBottom] = await Promise.all([
    loadImage(ASSETS.bg), loadImage(ASSETS.logo), loadImage(ASSETS.photoTop), loadImage(ASSETS.photoBottom)
  ]);

  // background
  ctx.drawImage(bg, 0, 0, W, H);

  // The background image has other stock photos baked in behind where the
  // foreground photos sit (only ever meant to be fully covered). Repaint that
  // whole column with clean marble texture (cloned live from a verified-clean
  // area of the same background) so nothing can peek out from behind the
  // foreground photos, no matter what size/aspect they end up being.
  const tileCanvas = document.createElement('canvas');
  tileCanvas.width = 460; tileCanvas.height = 300;
  tileCanvas.getContext('2d').drawImage(bg, 200, 300, 460, 300, 0, 0, 460, 300);
  const marblePattern = ctx.createPattern(tileCanvas, 'repeat');
  ctx.save();
  ctx.fillStyle = marblePattern;
  ctx.fillRect(1170, 160, 400, 740);
  ctx.restore();

  // logo
  ctx.drawImage(logo, 37, 19, 187, 187);

  // photos (square format, same general space as before)
  const photoSize = 345;
  ctx.drawImage(photoTop, 1186, 178, photoSize, photoSize);
  const bottomW = photoSize;
  const bottomH = bottomW * (photoBottom.naturalHeight / photoBottom.naturalWidth);
  ctx.drawImage(photoBottom, 1186, 178 + photoSize + 10, bottomW, bottomH);

  const navy = '#2C2D4A';
  const bodyColor = '#403B48';
  const condensed = '"Roboto Condensed", "Arial Narrow", sans-serif';
  const displayFont = '"Arial Black", Arial, sans-serif';

  // title: Convocatoria : VS {adversaire}
  ctx.fillStyle = navy;
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'center';
  const titleText = `Convocatoria : VS ${info.adversaire || ''}`;
  drawWrappedTitle(ctx, titleText, 224 + 866.5/2, 14, 866.5, 52, `800 46px ${displayFont}`);

  // "Liste de N joueurs :"
  const n = players.length;
  ctx.font = `800 46px ${displayFont}`;
  ctx.fillStyle = navy;
  ctx.textAlign = 'center';
  ctx.fillText(`Liste de ${n} joueur${n>1?'s':''} :`, 224 + 866.5/2, 215 + 42);

  // players list, centered as a block, up to 3 columns (balanced), column-major fill
  const listCenterX = 224 + 866.5/2;
  const listY = 323, rowH = 40; // moved up ~70px (~1.8cm) from the original position
  const cols = n > 12 ? 3 : (n > 6 ? 2 : 1);

  // balance column sizes as evenly as possible (max difference of 1 between columns)
  const base = Math.floor(n / cols) || 0;
  const rem = n % cols;
  const colCounts = [];
  for(let c=0; c<cols; c++) colCounts.push(base + (c < rem ? 1 : 0));
  const colOffsets = [0];
  for(let c=0; c<cols; c++) colOffsets.push(colOffsets[c] + colCounts[c]);

  const anyMute = players.some(p => p.mute);

  ctx.font = `400 30px ${condensed}`;
  const labels = players.map((p,i)=>({p, i, label:`${i+1}. ${p.name}`}));
  let maxItemWidth = 0;
  labels.forEach(({label, p})=>{
    let w = ctx.measureText(label).width;
    if(p.mute) w += ctx.measureText(' *').width;
    if(w > maxItemWidth) maxItemWidth = w;
  });
  const colGap = 60;
  const colSlot = maxItemWidth + colGap;
  const totalWidth = cols === 1 ? maxItemWidth : colSlot*(cols-1) + maxItemWidth;
  const listStartX = listCenterX - totalWidth/2;

  function colRowOf(i){
    for(let c=0; c<cols; c++){
      if(i < colOffsets[c+1]) return {col:c, row:i - colOffsets[c]};
    }
    return {col:cols-1, row:i - colOffsets[cols-1]};
  }

  ctx.textAlign = 'left';
  labels.forEach(({label, p, i})=>{
    const {col, row} = colRowOf(i);
    const x = listStartX + col * colSlot;
    const y = listY + row * rowH;
    ctx.font = `400 30px ${condensed}`;
    ctx.fillStyle = bodyColor;
    ctx.fillText(label, x, y);
    if(p.mute){
      const w = ctx.measureText(label).width;
      ctx.fillStyle = '#FF0000';
      ctx.font = `700 30px ${condensed}`;
      ctx.fillText(' *', x + w, y);
    }
  });

  // muted legend
  if(anyMute){
    ctx.textAlign = 'center';
    ctx.font = `700 24px ${condensed}`;
    const legendY = 566 + 55;
    const star = '*';
    const rest = ' = Joueur Muté';
    const totalW = ctx.measureText(star).width + ctx.measureText(rest).width;
    const startX = 316 + 866.5/2 - totalW/2 + 60;
    ctx.textAlign = 'left';
    ctx.fillStyle = '#FF0000';
    ctx.fillText(star, startX, legendY);
    ctx.fillStyle = navy;
    ctx.fillText(rest, startX + ctx.measureText(star).width, legendY);
  }

  // navy rectangle — drawn fresh (moved down + left, out of the old baked-in spot)
  const boxX = 50, boxY = 649, boxW = 447, boxH = 231;
  roundRect(ctx, boxX, boxY, boxW, boxH, 14);
  ctx.fillStyle = '#292951';
  ctx.fill();

  const boxCx = boxX + boxW/2;
  const maxTextW = boxW - 50;

  const dateFont = `700 27px ${condensed}`;
  const rdvFont = `700 27px ${condensed}`;
  const adresseFont = `400 24px ${condensed}`;

  // wrap each paragraph into sublines first, to compute total block height
  const dateLines = info.date ? wrapLines(ctx, formatDate(info.date), maxTextW, dateFont) : [];
  const rdvLine = `RDV ${info.heure || '—'} au ${info.lieu || '—'}`;
  const rdvLines = wrapLines(ctx, rdvLine, maxTextW, rdvFont);
  const adresseLines = info.adresse ? wrapLines(ctx, info.adresse, maxTextW, adresseFont) : [];

  const dateLH = 34, rdvLH = 34, adresseLH = 30, paragraphGap = 16;
  let totalH = 0;
  if(dateLines.length) totalH += dateLines.length*dateLH + paragraphGap;
  if(rdvLines.length) totalH += rdvLines.length*rdvLH + paragraphGap;
  if(adresseLines.length) totalH += adresseLines.length*adresseLH;

  let iy = boxY + (boxH - totalH)/2 + dateLH*0.75;
  ctx.textAlign = 'center';

  if(dateLines.length){
    ctx.font = dateFont;
    ctx.fillStyle = '#ffffff';
    dateLines.forEach(line=>{ ctx.fillText(line, boxCx, iy); iy += dateLH; });
    iy += paragraphGap - dateLH*0.25;
  }
  if(rdvLines.length){
    ctx.font = rdvFont;
    ctx.fillStyle = '#ffffff';
    rdvLines.forEach(line=>{ ctx.fillText(line, boxCx, iy); iy += rdvLH; });
    iy += paragraphGap - rdvLH*0.25;
  }
  if(adresseLines.length){
    ctx.font = adresseFont;
    ctx.fillStyle = 'rgba(255,255,255,.9)';
    adresseLines.forEach(line=>{ ctx.fillText(line, boxCx, iy); iy += adresseLH; });
  }

  // top-right instructions block (fixed club notice)
  const instrX = 1186, instrW = 347, instrCx = instrX + instrW/2;
  let ry = 19 + 26;
  ctx.textAlign = 'center';
  ctx.font = `italic 700 22px ${condensed}`;
  const instrLine1 = wrapLines(ctx, 'Survêtement du club obligatoire.', instrW, `italic 700 22px ${condensed}`);
  ctx.fillStyle = '#FF0000';
  instrLine1.forEach(line=>{ ctx.fillText(line, instrCx, ry); ry += 26; });
  ry += 6;
  drawRichWrappedCentered(ctx, [
    {text:'Pensez à la gourde et aux affaires de douche ', color: bodyColor, bold:false},
    {text:'(OBLIGATOIRE)', color:'#FF0000', bold:true},
    {text:'. Merci de prévoir des vêtements de pluie si nécessaire', color: bodyColor, bold:false}
  ], instrCx, ry, instrW, 24, `italic 400 20px ${condensed}`, `italic 700 20px ${condensed}`);

  // footer
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8a8f96';
  const footerLines = wrapLines(ctx, "Merci d'informer systématiquement du retard ou de l'absence de votre enfant", 866.5, `italic 700 22px ${condensed}`);
  ctx.font = `italic 700 22px ${condensed}`;
  let fy = 862;
  footerLines.forEach(line=>{ ctx.fillText(line, 408 + 866.5/2, fy); fy += 26; });

  const block = document.createElement('div');
  block.className = 'imgBlock';
  const h3 = document.createElement('div');
  h3.style.fontWeight='700';
  h3.style.marginBottom='6px';
  h3.style.color = teamKey === 'A' ? '#d62828' : '#1a3fa0';
  h3.textContent = 'Équipe ' + teamKey;
  block.appendChild(h3);
  block.appendChild(canvas);
  const link = document.createElement('a');
  link.className = 'btn btn-primary save-link';
  link.textContent = "Télécharger l'image Équipe " + teamKey;
  link.href = canvas.toDataURL('image/png');
  const teamNum = teamKey === 'A' ? '1' : '2';
  const dateForName = filenameDate(info.date);
  link.download = `Convocatoria${dateForName ? '_' + dateForName : ''}_(${teamNum}).png`;
  block.appendChild(document.createElement('br'));
  block.appendChild(link);
  wrap.appendChild(block);
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

// Wraps mixed-style runs (array of {text,color,bold}) into centered lines within maxWidth.
function drawRichWrappedCentered(ctx, runs, cx, y, maxWidth, lineHeight, regularFont, boldFont){
  // tokenize into words, each carrying its style
  const words = [];
  runs.forEach(run=>{
    run.text.split(' ').forEach(w=>{
      if(w.length) words.push({text:w, color:run.color, bold:run.bold});
    });
  });
  // measure helper
  function widthOf(word){
    ctx.font = word.bold ? boldFont : regularFont;
    return ctx.measureText(word.text).width;
  }
  ctx.font = regularFont;
  const spaceWidth = ctx.measureText(' ').width;

  // split into lines
  let lines = [];
  let cur = [];
  let curWidth = 0;
  words.forEach(word=>{
    const w = widthOf(word);
    const addWidth = cur.length ? spaceWidth + w : w;
    if(curWidth + addWidth > maxWidth && cur.length){
      lines.push(cur);
      cur = [word];
      curWidth = w;
    } else {
      cur.push(word);
      curWidth += addWidth;
    }
  });
  if(cur.length) lines.push(cur);

  // draw each line centered
  lines.forEach((line, i)=>{
    const lineWidth = line.reduce((acc,word,idx)=> acc + widthOf(word) + (idx>0?spaceWidth:0), 0);
    let x = cx - lineWidth/2;
    ctx.textAlign = 'left';
    line.forEach(word=>{
      ctx.font = word.bold ? boldFont : regularFont;
      ctx.fillStyle = word.color;
      ctx.fillText(word.text, x, y + i*lineHeight);
      x += widthOf(word) + spaceWidth;
    });
  });
  ctx.textAlign = 'center';
}

function drawWrappedTitle(ctx, text, cx, y, maxWidth, lineHeight, font){
  ctx.font = font;
  const words = text.split(' ');
  let lines = [];
  let cur = '';
  words.forEach(w=>{
    const test = cur ? cur + ' ' + w : w;
    if(ctx.measureText(test).width > maxWidth && cur){
      lines.push(cur);
      cur = w;
    } else {
      cur = test;
    }
  });
  if(cur) lines.push(cur);
  ctx.textAlign = 'center';
  lines.forEach((line, i)=>{
    ctx.fillText(line, cx, y + lineHeight*(i+1));
  });
}

function wrapLines(ctx, text, maxWidth, font){
  ctx.font = font;
  const words = (text||'').split(' ');
  let lines = [];
  let cur = '';
  words.forEach(w=>{
    const test = cur ? cur + ' ' + w : w;
    if(ctx.measureText(test).width > maxWidth && cur){
      lines.push(cur);
      cur = w;
    } else {
      cur = test;
    }
  });
  if(cur) lines.push(cur);
  return lines;
}

function drawWrapped(ctx, text, x, y, maxWidth, lineHeight){
  const words = (text||'').split(' ');
  let lines = [];
  let cur = '';
  words.forEach(w=>{
    const test = cur ? cur + ' ' + w : w;
    if(ctx.measureText(test).width > maxWidth && cur){
      lines.push(cur);
      cur = w;
    } else {
      cur = test;
    }
  });
  if(cur) lines.push(cur);
  lines.forEach((line, i)=>{
    ctx.fillText(line, x, y + lineHeight*i);
  });
  return y + lineHeight*lines.length;
}

// ---------- init ----------
(async function init(){
  await loadAll();
  renderChildren();
  renderMatches();
  renderMatchSelect();
})();
</script>
